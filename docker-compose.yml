services:
  postgres:
    image: postgres:18-alpine
    container_name: my-watch-tower-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_watch_tower
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d my_watch_tower"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local